# GlobalClass API Gateway — Nginx
# Routes traffic between the two microservices and load-balances across scaled instances:
#   core-api         (port 4000) — Auth, Catalog, Scheduling, Q&A
#   streaming-engine (port 4001) — Stream session management + LiveKit tokens
#
# LOAD BALANCING:
#   Nginx uses `least_conn` load balancing for HTTP — new requests go to whichever
#   upstream instance has the fewest active connections.
#
#   The Docker service name (core-api, streaming-engine) resolves to ALL container IPs
#   when scaled with --scale, so adding more upstream entries is not needed.
#   Docker's internal DNS automatically returns all IPs for a service name.
#
#   To scale: docker compose up -d --scale core-api=3
#   All 3 instances share the same Redis for Q&A state and Pub/Sub broadcast.
#
# WEBSOCKET STICKINESS:
#   WebSocket connections (Q&A) are long-lived. Once a client opens a WS connection
#   to an instance, it stays there for the session — no mid-session re-routing.
#   New connections are distributed via least_conn; existing connections are stable.
#   Redis Pub/Sub ensures all instances broadcast Q&A updates to their local clients,
#   so users on different instances all see the same real-time question feed.

upstream core_api {
    least_conn;
    server core-api:4000;
    # NOTE on Docker DNS and scaling:
    # Docker Compose's built-in DNS load-balances at the network level when
    # you scale a service. `server core-api:4000` resolves via round-robin
    # across all running core-api containers automatically when combined with
    # `least_conn`. The resolver block below ensures short TTL so Nginx picks
    # up new instances quickly after a scale-up.
}

upstream streaming {
    least_conn;
    server streaming-engine:4001;
}

server {
    listen 80;

    # ── Streaming Engine routes ──────────────────────────────────
    location /api/stream {
        proxy_pass         http://streaming;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Q&A WebSocket (load-balanced, Redis Pub/Sub keeps all instances in sync) ──
    location /qaws {
        proxy_pass         http://core_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Core API — all other REST routes ─────────────────────────
    location /api {
        proxy_pass         http://core_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Health checks for each service
    location /health/core {
        proxy_pass http://core_api/health;
    }

    location /health/streaming {
        proxy_pass http://streaming/health;
    }
}
